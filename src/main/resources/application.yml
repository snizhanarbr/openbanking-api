server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:bankdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

external-bank:
  base-url: http://localhost:8080/mock-bank